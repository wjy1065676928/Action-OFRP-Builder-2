name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/wjy1065676928/android_device_xiaomi_crux'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/xiaomi/crux'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'crux'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'omni_crux'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'
      CACHE_REPO_URL:
        description: 'CACHE_REPO_URL (git repo for out/ cache, leave blank to use current repo)'
        required: false
        default: 'https://github.com/wjy1065676928/Action-OFRP-Builder-2'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
 
    # You might want to Checkout your repo first, but not mandatory
    - name: Check Out
      uses: actions/checkout@v4

    # Cleanup The Actions Workspace Using Custom Composite Run Actions
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            git python3 tar aria2 ccache zstd
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-android-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}
        restore-keys: |
          ${{ runner.os }}-android-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-
          ${{ runner.os }}-android-ccache-

    - name: Restore & Save repo metadata cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/.repo
        key: ${{ runner.os }}-android-repo-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}
        restore-keys: |
          ${{ runner.os }}-android-repo-${{ github.event.inputs.MANIFEST_BRANCH }}-
          ${{ runner.os }}-android-repo-

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone --depth=1 "${{ github.event.inputs.SYNC_URL }}"
        cd sync
        sed -i 's/git clone /git clone --depth=1 /g' ./orangefox_sync.sh || true
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone --depth=1 "${{ github.event.inputs.DEVICE_TREE_URL }}" -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" "./${{ github.event.inputs.DEVICE_PATH }}"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != ''
        && github.event.inputs.COMMON_PATH != ''
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone --depth=1 "${{ github.event.inputs.COMMON_TREE_URL }}" -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" "./${{ github.event.inputs.COMMON_PATH }}"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Prepare DTB image
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        mkdir -p out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        
        # Search for dtb.img in device tree directories
        echo "Searching for dtb.img or *.dtb files..."
        DTB_IMG=$(find device -name "dtb.img" 2>/dev/null | head -1)
        DTB_FILE=$(find device -name "*.dtb" 2>/dev/null | head -1)
        
        if [ -n "$DTB_IMG" ]; then
          echo "Found dtb.img at: $DTB_IMG"
          cp -v "$DTB_IMG" "out/target/product/${{ github.event.inputs.DEVICE_NAME }}/dtb.img"
        elif [ -n "$DTB_FILE" ]; then
          echo "Found *.dtb file at: $DTB_FILE"
          cp -v "$DTB_FILE" "out/target/product/${{ github.event.inputs.DEVICE_NAME }}/dtb.img"
        else
          echo "Warning: No dtb.img or *.dtb found in device tree. Build may fail."
          echo "Searched in: device directory"
          find device -type f \( -name "*.dtb" -o -name "dtb*" \) 2>/dev/null || true
        fi
        
        echo "DTB preparation complete."
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Restore out/ cache from repo branch
      id: restore-cache
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set +e
        DEVICE="${{ github.event.inputs.DEVICE_NAME }}"
        CACHE_BRANCH="cache-${DEVICE}"
        CACHE_URL="${{ github.event.inputs.CACHE_REPO_URL }}"
        if [ -z "$CACHE_URL" ]; then
          CACHE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
        else
          # Inject token into HTTPS GitHub URLs for authentication
          case "$CACHE_URL" in
            https://github.com/*)
              CACHE_URL="https://x-access-token:${GITHUB_TOKEN}@${CACHE_URL#https://}"
              ;;
          esac
        fi
        
        echo "Looking for out cache in repo: branch=${CACHE_BRANCH}"
        
        if git clone --depth=1 -b "$CACHE_BRANCH" "$CACHE_URL" /tmp/cache-repo 2>/dev/null; then
          PART_COUNT=$(ls /tmp/cache-repo/cache-part-* 2>/dev/null | wc -l)
          if [ "$PART_COUNT" -gt 0 ]; then
            echo "Cache found ($PART_COUNT parts)! Reconstructing and extracting..."
            cat /tmp/cache-repo/cache-part-* > /tmp/out-cache.tar.zst
            tar --zstd -xf /tmp/out-cache.tar.zst \
              -C "${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"
            echo "cache_restored=true" >> $GITHUB_OUTPUT
            echo "Out cache restored successfully."
          else
            echo "cache_restored=false" >> $GITHUB_OUTPUT
            echo "Branch exists but no cache parts found."
          fi
          rm -rf /tmp/cache-repo
        else
          echo "cache_restored=false" >> $GITHUB_OUTPUT
          echo "Cache branch '${CACHE_BRANCH}' not found, will build from scratch."
        fi
        set -e
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch vibrator path in events.cpp
      run: |
        FOX_DIR="${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"
        
        # Auto-detect events.cpp location
        EVENTS_CPP=$(find "$FOX_DIR" -path "*/recovery/*/events.cpp" -o -path "*/minuitwrp/events.cpp" 2>/dev/null | head -1)
        
        if [ -z "$EVENTS_CPP" ]; then
          # Broader fallback
          EVENTS_CPP=$(find "$FOX_DIR" -name "events.cpp" -path "*/recovery/*" 2>/dev/null | head -1)
        fi
        
        if [ -z "$EVENTS_CPP" ]; then
          echo "Warning: events.cpp not found under recovery path, trying broader search..."
          EVENTS_CPP=$(find "$FOX_DIR" -name "events.cpp" 2>/dev/null | head -1)
        fi
        
        if [ -n "$EVENTS_CPP" ]; then
          echo "Found events.cpp at: $EVENTS_CPP"
          
          # Apply vibrator path patches
          sed -i 's|/sys/class/leds/vibrator/duration|/sys/devices/platform/soc/89c000.i2c/i2c-1/1-005a/duration|g' "$EVENTS_CPP"
          sed -i 's|/sys/class/leds/vibrator/activate|/sys/devices/platform/soc/89c000.i2c/i2c-1/1-005a/activate|g' "$EVENTS_CPP"
          
          echo "Vibrator paths patched in: $EVENTS_CPP"
          grep -n "vibrator\|activate\|duration" "$EVENTS_CPP" || true
        else
          echo "Warning: events.cpp not found anywhere in source tree, skipping patch."
          find "$FOX_DIR" -name "events.cpp" 2>/dev/null || true
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building recovery
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        mkdir -p ~/.ccache
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache
        ccache -M 10G
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Save out/ cache to repo branch
      if: success()
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set +e
        DEVICE="${{ github.event.inputs.DEVICE_NAME }}"
        CACHE_BRANCH="cache-${DEVICE}"
        CACHE_URL="${{ github.event.inputs.CACHE_REPO_URL }}"
        if [ -z "$CACHE_URL" ]; then
          CACHE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
        else
          # Inject token into HTTPS GitHub URLs for authentication
          case "$CACHE_URL" in
            https://github.com/*)
              CACHE_URL="https://x-access-token:${GITHUB_TOKEN}@${CACHE_URL#https://}"
              ;;
          esac
        fi
        
        FOX_DIR="${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}"
        OUT_DIR="${FOX_DIR}/out/target/product/${DEVICE}"
        
        if [ ! -d "$OUT_DIR" ]; then
          echo "Output directory not found, skipping cache upload."
          exit 0
        fi
        
        echo "Compressing out directory (excluding final images)..."
        cd "$FOX_DIR"
        tar --zstd \
          --exclude="out/target/product/${DEVICE}/*.img" \
          --exclude="out/target/product/${DEVICE}/*.zip" \
          -cf /tmp/out-cache.tar.zst \
          "out/target/product/${DEVICE}/"
        
        CACHE_SIZE=$(du -h /tmp/out-cache.tar.zst | cut -f1)
        echo "Compressed cache size: $CACHE_SIZE"
        
        # Split into chunks under 100MB (GitHub limit), then push
        rm -rf /tmp/cache-repo
        mkdir /tmp/cache-repo
        cd /tmp/cache-repo
        split -b 95M /tmp/out-cache.tar.zst cache-part-
        
        PART_COUNT=$(ls cache-part-* | wc -l)
        echo "Split into $PART_COUNT parts"
        
        git init
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Update out cache for ${DEVICE} [$(date -u +'%Y-%m-%d %H:%M UTC')]"
        git remote add origin "$CACHE_URL"
        git push -f origin HEAD:refs/heads/${CACHE_BRANCH}
        
        echo "Out cache saved to branch '${CACHE_BRANCH}'. Size: ${CACHE_SIZE}"
        set -e
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check the output directory before uploading
      run: |
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/
        echo
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
